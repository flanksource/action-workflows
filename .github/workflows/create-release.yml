---
name: Create Semantic Release

"on":
  workflow_call:
    inputs:
      extra_plugins:
        description: >-
          Newline-separated list of extra semantic-release plugins to
          install (e.g., @semantic-release/git).
        required: false
        type: string
        default: ""
    secrets:
      token:
        description: >-
          GitHub token to use for checkout, git push, and GitHub release
          operations.
        required: true
    outputs:
      published:
        description: >-
          'true' when semantic-release determined a new version is
          due and a release was created
        value: ${{ jobs.create-release.outputs.published }}
      version:
        description: >-
          Computed semantic version without prefix (e.g., 1.2.3).
          Empty when published is 'false'.
        value: ${{ jobs.create-release.outputs.version }}
      tag:
        description: >-
          Computed git tag including any prefix (e.g., v1.2.3).
          Empty when published is 'false'.
        value: ${{ jobs.create-release.outputs.tag }}

permissions: {}

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
      tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.token }}
          persist-credentials: true

      - name: Create release with semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@16ca923e6ccbb50770c415a0ccd43709a8c5f7a4 # v4.2.2
        with:
          extra_plugins: ${{ inputs.extra_plugins }}
        env:
          GITHUB_TOKEN: ${{ secrets.token }}
