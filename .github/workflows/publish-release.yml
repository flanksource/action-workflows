---
name: Publish Draft Release

"on":
  workflow_call:
    inputs:
      tag:
        description: >-
          Git tag of the draft release to publish (e.g., v1.2.3).
          Must match the tag output by create-draft-release.
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          gh release edit "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false
