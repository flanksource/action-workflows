---
name: Publish Draft Release

"on":
  workflow_call:
    inputs:
      tag:
        description: >-
          Git tag of the draft release to publish (e.g., v1.2.3).
          Must match the release tag to publish.
        required: true
        type: string
    secrets:
      token:
        description: >-
          GitHub token to use for publishing the draft release.
        required: true

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.token }}
          TAG: ${{ inputs.tag }}
        run: |
          gh release edit "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false
